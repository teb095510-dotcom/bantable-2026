<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 台味萬花筒｜員工班表查詢</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft JhengHei','微軟正黑體',sans-serif;background:#f4f5f7;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#8B0000,#c0392b);color:#fff;padding:22px 20px;text-align:center}
.header h1{font-size:1.55em;letter-spacing:1px}
.header p{opacity:.85;font-size:.88em;margin-top:5px}
.container{max-width:860px;margin:0 auto;padding:20px 16px}
.card{background:#fff;border-radius:14px;padding:28px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin-bottom:18px}
.card-title{font-size:1.05em;font-weight:700;color:#555;margin-bottom:16px}
.query-row{display:flex;gap:10px}
.query-row input{flex:1;padding:10px 15px;border:1.5px solid #ddd;border-radius:8px;font-size:1em;font-family:inherit;outline:none;transition:border-color .2s}
.query-row input:focus{border-color:#c0392b}
.query-row input:disabled{background:#f8f8f8;color:#999}
.btn{display:inline-block;padding:9px 22px;border-radius:8px;border:none;cursor:pointer;font-size:.93em;font-weight:700;font-family:inherit;transition:all .2s}
.btn-red{background:#c0392b;color:#fff}.btn-red:hover{background:#a93226}
.btn-red:disabled{opacity:.45;cursor:not-allowed}
.msg{padding:11px 15px;border-radius:8px;margin-top:12px;font-size:.9em}
.msg-err{background:#fff0f0;border:1px solid #f5c6c6;color:#c0392b}
.loading-box{text-align:center;padding:28px 0;color:#999}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #eee;border-top-color:#c0392b;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-box p{font-size:.9em;margin-top:6px}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.dot-ok{background:#27ae60}.dot-err{background:#e74c3c}
.data-status{font-size:.82em;color:#888;margin-top:8px;display:flex;align-items:center;gap:4px}
.result-card{background:#fff;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.08);overflow:hidden;display:none}
.emp-header{background:linear-gradient(135deg,#8B0000,#c0392b);color:#fff;padding:20px 24px}
.emp-header h2{font-size:1.25em}
.emp-header p{opacity:.8;font-size:.86em;margin-top:4px}
.tabs{display:flex;border-bottom:2px solid #f0f0f0;padding:0 24px}
.tab-btn{padding:12px 20px;cursor:pointer;font-weight:700;border-bottom:3px solid transparent;margin-bottom:-2px;color:#999;transition:all .2s;font-size:.95em}
.tab-btn.active{color:#c0392b;border-bottom-color:#c0392b}
.tab-pane{display:none;padding:22px 24px}.tab-pane.active{display:block}
.period-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #f0f0f0}
.period-head h3{font-size:1em;color:#555}
.period-badge{background:#f0f0f0;color:#666;font-size:.78em;padding:2px 9px;border-radius:10px;font-weight:700}
.period-section{margin-bottom:28px}
.sched-table{width:100%;border-collapse:collapse;font-size:.88em}
.sched-table th{background:#fafafa;padding:8px 10px;text-align:left;font-weight:700;color:#666;border-bottom:2px solid #eee;white-space:nowrap}
.sched-table td{padding:7px 10px;border-bottom:1px solid #f3f3f3}
.sched-table tr:hover td{background:#fdfafa}
.sched-table .weekend td{color:#bbb}
.shift{display:inline-block;padding:2px 11px;border-radius:12px;font-weight:700;font-size:.83em;color:#fff}
.s-A{background:#27ae60}.s-B{background:#e67e22}.s-C{background:#8e44ad}.s-D{background:#2980b9}
.break-policy{background:#fff8e1;border:1px solid #ffe082;border-radius:10px;padding:14px 16px;margin-bottom:22px}
.break-policy h4{color:#b45309;font-size:.9em;margin-bottom:10px}
.break-policy .bp-rows{display:flex;flex-direction:column;gap:7px}
.break-policy .bp-item{display:flex;align-items:center;gap:8px;font-size:.87em;color:#444}
.break-policy .bp-note{font-size:.81em;color:#888;margin-top:10px;padding-top:8px;border-top:1px solid #ffe082;line-height:1.5}
.sal-table{width:100%;border-collapse:collapse;font-size:.88em}
.sal-table th{background:#fafafa;padding:8px 12px;font-weight:700;color:#666;border-bottom:2px solid #eee;text-align:right}
.sal-table th:first-child{text-align:left}
.sal-table td{padding:8px 12px;border-bottom:1px solid #f3f3f3;text-align:right}
.sal-table td:first-child{text-align:left;color:#444}
.sal-table tr.sub-total td{background:#f9f9f9;font-weight:700;border-top:1.5px solid #eee}
.grand-box{background:linear-gradient(135deg,#8B0000,#c0392b);color:#fff;border-radius:12px;padding:20px 24px;display:flex;justify-content:space-between;align-items:center;margin-top:20px}
.grand-box .label{font-size:.92em;opacity:.85}
.grand-box .amount{font-size:1.7em;font-weight:700}
.sal-note{font-size:.78em;color:#aaa;margin-top:12px;line-height:1.6}
.data-footer{text-align:center;font-size:.78em;color:#bbb;margin-top:10px;padding-bottom:20px}
@media(max-width:540px){.card,.tab-pane{padding:18px 14px}.emp-header{padding:16px}.tabs{padding:0 14px}.sched-table,.sal-table{font-size:.8em}.sched-table th,.sched-table td,.sal-table th,.sal-table td{padding:6px 7px}.query-row{flex-direction:column}}
</style>
</head>
<body>
<div class="header">
  <h1>🎪 2026 台味萬花筒</h1>
  <p>駁二特展二十周年｜員工班表 &amp; 薪資查詢</p>
</div>
<div class="container">
  <div class="card">
    <div class="card-title">員工班表查詢</div>
    <div id="loadingBox" class="loading-box">
      <div class="spinner"></div>
      <p>正在載入最新班表資料…</p>
    </div>
    <div id="queryBox" style="display:none">
      <div class="query-row">
        <input type="email" id="emailInput" placeholder="請輸入您的 Email…" autocomplete="email">
        <button class="btn btn-red" onclick="doQuery()">查詢</button>
      </div>
      <div id="queryMsg"></div>
      <div class="data-status" id="dataStatus"></div>
    </div>
  </div>
  <div class="result-card" id="resultCard">
    <div class="emp-header">
      <h2 id="empName"></h2>
      <p id="empMeta"></p>
    </div>
    <div class="tabs">
      <div class="tab-btn active" onclick="switchTab('sched',this)">📅 班表</div>
      <div class="tab-btn" onclick="switchTab('salary',this)">💰 薪資計算</div>
    </div>
    <div class="tab-pane active" id="pane-sched"></div>
    <div class="tab-pane" id="pane-salary"></div>
  </div>
  <div class="data-footer" id="dataFooter"></div>
</div>
<script>
const SHEET_ID = '1qKcHmdB9VpsTH3rZhg-0tku3W9lgbeuGIEzlow7Rg9E';
const XLSX_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/export?format=xlsx';
const WEEKDAYS = ['日','一','二','三','四','五','六'];
const PERIODS  = ['進場','6月','7月','8月','撤場'];
const SCHED_SH = {進場:'進場','6月':'6月班表','7月':'7月班表','8月':'8月班表',撤場:'撤場'};
const SAL_SH   = {進場:'進場薪資','6月':'6月薪資','7月':'7月薪資','8月':'8月薪資',撤場:'撤場薪資'};
let DB = null, loadedAt = null;
async function loadData() {
  try {
    const res = await fetch(XLSX_URL, { cache:'no-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status + ' — 請確認 Google 試算表已設為「知道連結的人可以檢視」');
    const buf = await res.arrayBuffer();
    const wb  = XLSX.read(new Uint8Array(buf), { type:'array', raw:true, cellDates:false });
    DB = parseWorkbook(wb);
    const count = Object.keys(DB).length;
    if (count === 0) throw new Error('試算表中未找到員工資料，請確認格式是否正確');
    loadedAt = new Date();
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('queryBox').style.display = 'block';
    const ts = loadedAt.toLocaleString('zh-TW');
    document.getElementById('dataStatus').innerHTML = '<span class="status-dot dot-ok"></span>資料已載入（' + count + ' 名員工）｜更新時間：' + ts;
    document.getElementById('emailInput').focus();
  } catch(err) {
    document.getElementById('loadingBox').innerHTML = '<div class="msg msg-err">❌ 資料載入失敗：' + err.message + '</div><div style="margin-top:12px"><button class="btn btn-red" onclick="retryLoad()">🔄 重新載入</button></div>';
  }
}
function retryLoad(){document.getElementById('loadingBox').innerHTML='<div class="spinner"></div><p>正在重新載入…</p>';setTimeout(loadData,300);}
function xlDate(v){if(v==null)return null;if(typeof v==='number'&&v>40000){const ms=Math.round((v-25569)*86400000),d=new Date(ms);return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');}if(typeof v==='string'){const m=v.match(/\d{4}-\d{2}-\d{2}/);return m?m[0]:null;}return null;}
function num(v){return typeof v==='number'?v:0;}
function rows(ws){return XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});}
function parseWorkbook(wb){const empMap=parseEmpList(wb);for(const p in SCHED_SH){const ws=wb.Sheets[SCHED_SH[p]];if(!ws)continue;const s=parseSchedSheet(ws,p);for(const id in s){if(empMap[id])empMap[id].schedules[p]=s[id];}}for(const p in SAL_SH){const ws=wb.Sheets[SAL_SH[p]];if(!ws)continue;const s=parseSalSheet(ws,p);for(const id in s){if(empMap[id])empMap[id].salaries[p]=s[id];}}const db={};for(const emp of Object.values(empMap)){if(emp.email)db[emp.email]=emp;}return db;}
function parseEmpList(wb){const ws=wb.Sheets['全檔薪資'];if(!ws)return{};const R=rows(ws),out={};for(let i=3;i<R.length;i++){const row=R[i];if(typeof row[0]!=='number')continue;const name=row[1];if(!name||name===0)continue;const id=String(Math.round(row[0]));let email=row[15]?String(row[15]).replace(/\n/g,'').trim().toLowerCase():'';if(!email||email==='nan'||email==='0')email='';out[id]={id,name:String(name),email,schedules:{},salaries:{}};}return out;}
function parseSchedSheet(ws,period){const R=rows(ws);if(!R||R.length<6)return{};const dateRow=R[4]||[],dateCols={};for(let c=10;c<dateRow.length;c++){const ds=xlDate(dateRow[c]);if(ds)dateCols[c]=ds;}const out={};let row=5;while(row<R.length){const idv=R[row]&&R[row][0];if(typeof idv!=='number'){row++;continue;}const namev=R[row][1];if(!namev){row++;continue;}const id=String(Math.round(idv));const rA=R[row]||[],rB=R[row+1]||[],rC=R[row+2]||[],rD=R[row+3]||[];const daily={};for(const c in dateCols){const ci=parseInt(c),sc=rD[ci];if(sc==null)continue;daily[dateCols[c]]={shift:String(sc).trim(),start:rA[ci],end:rB[ci],extra:rC[ci]};}out[id]={period,hourlyRate:num(R[row][6]),daily};row+=5;}return out;}
function parseSalSheet(ws,period){const R=rows(ws);if(!R||R.length<4)return{};const out={};const isSetup=(period==='進場');for(let i=3;i<R.length;i++){const row=R[i];if(typeof row[0]!=='number')continue;const id=String(Math.round(row[0])),g=c=>num(row[c]);if(isSetup){out[id]={period,genHours:g(2),hourlyRate:g(3),genPay:g(4),ot2Hours:g(5),ot2Rate:g(6),ot2Pay:g(7),ot4Hours:g(8),ot4Rate:g(9),ot4Pay:g(10),totalOtPay:g(13),extraPay:0,totalPay:g(14)};}else{out[id]={period,genHours:g(2),hourlyRate:g(3),genPay:g(4),ot2Hours:g(5),ot2Rate:g(6),ot2Pay:g(7),ot4Hours:g(8),ot4Rate:g(9),ot4Pay:g(10),totalOtPay:g(13),extraPay:g(14),totalPay:g(15)};}}return out;}
function doQuery(){clearMsg('queryMsg');document.getElementById('resultCard').style.display='none';const email=document.getElementById('emailInput').value.trim().toLowerCase();if(!email){setMsg('queryMsg','請輸入 Email','err');return;}if(!DB){setMsg('queryMsg','資料尚未載入，請稍候再試','err');return;}const emp=DB[email];if(!emp){setMsg('queryMsg','找不到此 Email，請確認是否輸入正確，或洽詢管理員','err');return;}renderResult(emp);}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.activeElement.id==='emailInput')doQuery();});
function renderResult(emp){document.getElementById('empName').textContent=emp.name+' 的班表與薪資';document.getElementById('empMeta').textContent='員工編號：'+emp.id;renderSched(emp);renderSalary(emp);document.getElementById('resultCard').style.display='block';document.getElementById('resultCard').scrollIntoView({behavior:'smooth',block:'start'});document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));document.querySelectorAll('.tab-pane').forEach((p,i)=>p.classList.toggle('active',i===0));}
function fmtTime(t){if(t==null||t==='')return'--';const h=Math.floor(t),m=Math.round((t-h)*60);if(h>=24)return'+1日'+String(h-24).padStart(2,'0')+':'+String(m).padStart(2,'0');return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
function shiftTime(shift,start,end){if(shift==='A')return{s:'11:00',e:'20:00'};if(shift==='B'||shift==='C')return{s:'11:00',e:'22:00'};return{s:fmtTime(start),e:fmtTime(end)};}
function renderSched(emp){const c=document.getElementById('pane-sched');const today=new Date().toISOString().split('T')[0];const worked=PERIODS.filter(p=>emp.schedules[p]&&Object.keys(emp.schedules[p].daily).length>0);if(!worked.length){c.innerHTML='<div style="color:#aaa;text-align:center;padding:20px">無班表資料</div>';return;}let html='';for(const period of worked){const{daily}=emp.schedules[period];const days=Object.entries(daily).filter(([,d])=>d.shift).sort((a,b)=>a[0].localeCompare(b[0]));if(!days.length)continue;html+='<div class="period-section"><div class="period-head"><h3>📆 '+period+' 班表</h3><span class="period-badge">共 '+days.length+' 天</span></div><table class="sched-table"><thead><tr><th>日期</th><th>星期</th><th>班別</th><th>上班</th><th>下班</th></tr></thead><tbody>';for(const[date,info]of days){const d=new Date(date+'T00:00:00Z'),dow=d.getUTCDay(),isTod=date===today,isWk=dow>=1&&dow<=6,shift=info.shift,{s,e}=shiftTime(shift,info.start,info.end);html+='<tr class="'+(isTod?'today':(!isWk?'weekend':''))+'"><td>'+date+'</td><td>週'+WEEKDAYS[dow]+'</td><td><span class="shift s-'+shift+'">'+shift+'班</span></td><td>'+s+'</td><td>'+e+'</td></tr>';}html+='</tbody></table></div>';}c.innerHTML=html;}
function fmtAmt(n){if(!n)return'-';return'$'+n.toLocaleString('zh-TW',{minimumFractionDigits:0,maximumFractionDigits:2});}
function fmtHr(n){if(!n)return'-';return n.toLocaleString('zh-TW',{minimumFractionDigits:0,maximumFractionDigits:2})+' H';}
function periodTotal(s){return(s.totalPay>0)?s.totalPay:(s.genPay||0)+(s.totalOtPay||0)+(s.extraPay||0);}
function renderSalary(emp){const c=document.getElementById('pane-salary');const worked=PERIODS.filter(p=>emp.salaries[p]&&((emp.salaries[p].genPay||0)>0||(emp.salaries[p].totalPay||0)>0||(emp.salaries[p].extraPay||0)>0));if(!worked.length){c.innerHTML='<div style="color:#aaa;text-align:center;padding:20px">無薪資資料</div>';return;}let html='',grand=0;html+='<div class="break-policy"><h4>📋 休息時間規定（週一至週四，6–8月）</h4><div class="bp-rows"><div class="bp-item"><span class="shift s-A">A 班</span>休息 1 小時，不計薪（實際計薪 8H）</div><div class="bp-item"><span class="shift s-B">B 班</span>休息 2 小時，不計薪（實際計薪 9H）</div></div><div class="bp-note">＊ 若當日休息時間不足標準，不足部分以 0.5 小時為單位換算為上班時間，併入薪資計算</div></div>';for(const period of worked){const s=emp.salaries[period];const pTotal=periodTotal(s);grand+=pTotal;const ot2=s.ot2Pay||0,ot4=s.ot4Pay||0,tot=ot2+ot4;html+='<div class="period-section"><div class="period-head"><h3>💵 '+period+' 薪資</h3><span class="period-badge">時薪 $'+s.hourlyRate+'/H</span></div><table class="sal-table"><thead><tr><th>項目</th><th>工時</th><th>時薪</th><th>金額</th></tr></thead><tbody><tr><td>一般工時</td><td>'+fmtHr(s.genHours)+'</td><td>$'+s.hourlyRate+'/H</td><td>'+fmtAmt(s.genPay)+'</td></tr>';if(ot2>0||s.ot2Hours>0)html+='<tr><td>加班費（×1.33）</td><td>'+fmtHr(s.ot2Hours)+'</td><td>$'+s.ot2Rate+'/H</td><td>'+fmtAmt(ot2)+'</td></tr>';if(ot4>0||s.ot4Hours>0)html+='<tr><td>加班費（×1.66）</td><td>'+fmtHr(s.ot4Hours)+'</td><td>$'+s.ot4Rate+'/H</td><td>'+fmtAmt(ot4)+'</td></tr>';if(tot>0)html+='<tr><td>加班費小計</td><td>-</td><td>-</td><td>'+fmtAmt(tot)+'</td></tr>';if(s.extraPay>0)html+='<tr><td>額外加給</td><td>-</td><td>-</td><td>'+fmtAmt(s.extraPay)+'</td></tr>';html+='<tr class="sub-total"><td colspan="3">本期薪資總額</td><td>'+fmtAmt(pTotal)+'</td></tr></tbody></table></div>';}html+='<div class="grand-box"><div class="label">全期薪資總計</div><div class="amount">'+fmtAmt(grand)+'</div></div><div class="sal-note">＊ 薪資以試算表計算結果為準<br>＊ 加班前 2H 以 ×1.33 計算；超過 2H 以 ×1.66 計算<br>＊ 如有疑問請洽管理員</div>';c.innerHTML=html;}
function switchTab(name,el){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));el.classList.add('active');document.getElementById('pane-'+name).classList.add('active');}
function setMsg(id,text,type){const el=document.getElementById(id);if(!el)return;el.innerHTML='<div class="msg msg-'+type+'">'+text+'</div>';}
function clearMsg(id){const el=document.getElementById(id);if(el)el.innerHTML='';}
window.addEventListener('load',loadData);
</script>
</body>
</html>
